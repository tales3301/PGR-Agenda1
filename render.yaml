services:
  - type: web
    name: agenda-pgr
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agenda-pgr-db
          property: connectionString

databases:
  - name: agenda-pgr-db
    plan: starter
